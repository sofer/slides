<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Compare with label</title>
  <desc id="desc">A predicted class is compared with an expected class.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 2; }
    .green { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; }
    .red { fill: #ffebe9; stroke: #cf222e; stroke-width: 4; }
    .compare { stroke: #59636e; stroke-width: 5; stroke-linecap: round; }
    .mismatch { stroke: #cf222e; stroke-width: 8; stroke-linecap: round; }
    .arrow { fill: none; stroke: #59636e; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#59636e"/></marker></defs>
  <rect class="bg" width="1500" height="500"/>
  <g transform="translate(245 95)">
    <rect class="panel" x="0" y="0" width="260" height="260" rx="10"/>
    <circle class="green" cx="130" cy="130" r="54"/>
  </g>
  <path class="arrow" d="M575 225 H705"/>
  <g transform="translate(760 95)">
    <rect class="panel" x="0" y="0" width="260" height="260" rx="10"/>
    <circle class="red" cx="130" cy="130" r="54"/>
  </g>
  <line class="compare" x1="1045" y1="165" x2="1135" y2="285"/>
  <line class="compare" x1="1045" y1="285" x2="1135" y2="165"/>
  <line class="mismatch" x1="1190" y1="165" x2="1280" y2="285"/>
  <line class="mismatch" x1="1190" y1="285" x2="1280" y2="165"/>
</svg>
