<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif">
  <title id="title">Activation turns the score into a prediction</title>
  <desc id="desc">A continuous score on one side of the threshold passes through the activation step function and becomes one of two class predictions.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#59636e"></path>
    </marker>
  </defs>

  <rect width="1500" height="500" fill="#ffffff"></rect>

  <!-- LEFT panel: the raw score on a number line, sitting past the threshold -->
  <g transform="translate(140 82) scale(1.08)">
    <rect x="0" y="0" width="350" height="290" rx="10" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="2"></rect>

    <line x1="42" y1="150" x2="312" y2="150" stroke="#59636e" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"></line>

    <!-- threshold at 0 -->
    <line x1="178" y1="132" x2="178" y2="168" stroke="#59636e" stroke-width="2" opacity="0.6"></line>
    <circle cx="178" cy="150" r="5" fill="#ffffff" stroke="#59636e" stroke-width="2"></circle>

    <!-- distance past the threshold (coral = the quantity that matters) -->
    <path d="M178 182 H250" stroke="#fd8c73" stroke-width="3" stroke-linecap="round"></path>
    <line x1="178" y1="176" x2="178" y2="188" stroke="#fd8c73" stroke-width="3" stroke-linecap="round"></line>
    <line x1="250" y1="176" x2="250" y2="188" stroke="#fd8c73" stroke-width="3" stroke-linecap="round"></line>

    <!-- the score itself: neutral, not yet a class -->
    <circle cx="250" cy="150" r="16" fill="#eaeef2" stroke="#59636e" stroke-width="4"></circle>
  </g>

  <!-- becomes -->
  <path d="M610 245 H750" fill="none" stroke="#59636e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"></path>

  <!-- RIGHT panel: the activation step function maps the score to a class -->
  <g transform="translate(905 82) scale(1.08)">
    <rect x="0" y="0" width="350" height="290" rx="10" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="2"></rect>

    <!-- outcome regions: class B below-left, class A above-right -->
    <rect x="42" y="176" width="136" height="58" fill="#ffebe9" opacity="0.55"></rect>
    <rect x="178" y="46" width="136" height="58" fill="#dbeafe" opacity="0.55"></rect>

    <!-- axes -->
    <line x1="42" y1="238" x2="314" y2="238" stroke="#59636e" stroke-width="3" stroke-linecap="round"></line>
    <line x1="42" y1="238" x2="42" y2="28" stroke="#59636e" stroke-width="3" stroke-linecap="round"></line>

    <!-- threshold -->
    <line x1="178" y1="238" x2="178" y2="40" stroke="#59636e" stroke-width="2" stroke-dasharray="6 7" opacity="0.55"></line>

    <!-- the activation step -->
    <path d="M42 210 H178 V70 H314" fill="none" stroke="#9a6700" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>

    <!-- map the same score up to its prediction (coral guide) -->
    <path d="M250 238 V70" fill="none" stroke="#fd8c73" stroke-width="3" stroke-dasharray="7 7" stroke-linecap="round"></path>
    <circle cx="250" cy="238" r="6" fill="#eaeef2" stroke="#59636e" stroke-width="3"></circle>

    <!-- the prediction: class A -->
    <circle cx="250" cy="70" r="15" fill="#dbeafe" stroke="#2563eb" stroke-width="4"></circle>
  </g>
</svg>
