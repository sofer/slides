<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Linear classification has limits</title>
  <desc id="desc">XOR truth table on the left; scatter plots of the XOR inputs showing no single line separates the alternating classes, and two curved boundaries that do.</desc>
  <defs>
    <marker id="tip-big" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a9099"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 2; }
    .grid { stroke: #d1d9e0; stroke-width: 1.2; opacity: 0.7; }
    .axis { stroke: #59636e; stroke-width: 2.6; stroke-linecap: round; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; }
    .red { fill: #ffebe9; stroke: #cf222e; stroke-width: 4; }
    .tbl-blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
    .tbl-red { fill: #ffebe9; stroke: #cf222e; stroke-width: 3; }
    .boundary { stroke: #079c91; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .boundary-ghost { stroke: #079c91; stroke-width: 6; fill: none; stroke-linecap: round; opacity: 0.3; stroke-dasharray: 16 12; }
    .bigarrow { fill: none; stroke: #8a9099; stroke-width: 6; stroke-linecap: round; marker-end: url(#tip-big); }
    .qmark { font-family: 'Inter', Arial, sans-serif; font-size: 70px; font-weight: 700; fill: #59636e; text-anchor: middle; dominant-baseline: central; opacity: 0.7; }
    .tbl-hdr { font-family: 'Inter', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #1f2328; text-anchor: middle; dominant-baseline: central; }
    .tbl-cell { font-family: 'Inter', Arial, sans-serif; font-size: 28px; fill: #1f2328; text-anchor: middle; dominant-baseline: central; }
    .tbl-line { stroke: #d1d9e0; stroke-width: 2; fill: none; }
    .dot-label { font-family: 'Inter', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #1f2328; text-anchor: middle; dominant-baseline: central; }
  </style>
  <rect class="bg" width="1500" height="500"/>

  <!-- Truth table (x=25–325) -->
  <rect class="panel" x="25" y="70" width="300" height="360" rx="10"/>
  <line class="tbl-line" x1="131" y1="115" x2="131" y2="390"/>
  <line class="tbl-line" x1="218" y1="115" x2="218" y2="390"/>
  <text class="tbl-hdr" x="88" y="138">A</text>
  <text class="tbl-hdr" x="175" y="138">B</text>
  <text class="tbl-hdr" x="262" y="138">XOR</text>
  <line class="tbl-line" x1="40" y1="165" x2="310" y2="165"/>
  <text class="tbl-cell" x="88" y="203">0</text>
  <text class="tbl-cell" x="175" y="203">0</text>
  <circle class="tbl-blue" cx="262" cy="203" r="16"/>
  <text class="dot-label" x="262" y="203">0</text>
  <text class="tbl-cell" x="88" y="251">0</text>
  <text class="tbl-cell" x="175" y="251">1</text>
  <circle class="tbl-red" cx="262" cy="251" r="16"/>
  <text class="dot-label" x="262" y="251">1</text>
  <text class="tbl-cell" x="88" y="299">1</text>
  <text class="tbl-cell" x="175" y="299">0</text>
  <circle class="tbl-red" cx="262" cy="299" r="16"/>
  <text class="dot-label" x="262" y="299">1</text>
  <text class="tbl-cell" x="88" y="347">1</text>
  <text class="tbl-cell" x="175" y="347">1</text>
  <circle class="tbl-blue" cx="262" cy="347" r="16"/>
  <text class="dot-label" x="262" y="347">0</text>

  <!-- Scatter 1: XOR points + failed linear boundary (x=350–865) -->
  <rect class="panel" x="350" y="70" width="515" height="360" rx="10"/>
  <line class="grid" x1="504" y1="388" x2="504" y2="96"/>
  <line class="grid" x1="608" y1="388" x2="608" y2="96"/>
  <line class="grid" x1="711" y1="388" x2="711" y2="96"/>
  <line class="grid" x1="400" y1="315" x2="815" y2="315"/>
  <line class="grid" x1="400" y1="242" x2="815" y2="242"/>
  <line class="grid" x1="400" y1="169" x2="815" y2="169"/>
  <line class="axis" x1="400" y1="388" x2="815" y2="388"/>
  <line class="axis" x1="400" y1="388" x2="400" y2="96"/>
  <line class="boundary-ghost" x1="420" y1="242" x2="795" y2="242"/>
  <text class="qmark" x="608" y="242">?</text>
  <circle class="blue" cx="504" cy="315" r="11"/>
  <circle class="blue" cx="711" cy="169" r="11"/>
  <circle class="red" cx="504" cy="169" r="11"/>
  <circle class="red" cx="711" cy="315" r="11"/>

  <!-- Arrow between the two scatter plots -->
  <line class="bigarrow" x1="882" y1="250" x2="938" y2="250"/>

  <!-- Scatter 2: XOR points + two curved boundaries (x=955–1470) -->
  <rect class="panel" x="955" y="70" width="515" height="360" rx="10"/>
  <line class="grid" x1="1109" y1="388" x2="1109" y2="96"/>
  <line class="grid" x1="1213" y1="388" x2="1213" y2="96"/>
  <line class="grid" x1="1316" y1="388" x2="1316" y2="96"/>
  <line class="grid" x1="1005" y1="315" x2="1420" y2="315"/>
  <line class="grid" x1="1005" y1="242" x2="1420" y2="242"/>
  <line class="grid" x1="1005" y1="169" x2="1420" y2="169"/>
  <line class="axis" x1="1005" y1="388" x2="1420" y2="388"/>
  <line class="axis" x1="1005" y1="388" x2="1005" y2="96"/>
  <path class="boundary" d="M1163 132 Q 1226 292 1077 224"/>
  <path class="boundary" d="M1262 360 Q 1199 200 1348 268"/>
  <circle class="blue" cx="1109" cy="315" r="11"/>
  <circle class="blue" cx="1316" cy="169" r="11"/>
  <circle class="red" cx="1109" cy="169" r="11"/>
  <circle class="red" cx="1316" cy="315" r="11"/>
</svg>
